name: Publish to Registries

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write 
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Publish to npmjs using OIDC
      - name: Set up Node.js for npmjs
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org/'

      - name: Fix setup-node OIDC bug
        run: sed -i '/_authToken/d' "${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}"

      - name: Update npm to latest
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Publish to npmjs via Trusted Publishing
        run: npm publish --access public --provenance
        # NO env block here whatsoever

      # 2. Swap context and publish to GitHub Packages
      - name: Set up Node.js for GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          registry-url: 'https://npm.pkg.github.com/'

      - name: Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}