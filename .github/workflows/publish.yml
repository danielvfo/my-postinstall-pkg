name: Publish to GitHub Packages

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    
    # Explicitly grant the GITHUB_TOKEN permission to write packages
    permissions:
      contents: read
      packages: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://npm.pkg.github.com'

      - name: Install dependencies
        run: npm ci

      - name: Publish package
        run: npm publish
        env:
          # GitHub automatically provisions this token per workflow run
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}